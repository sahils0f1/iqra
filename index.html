<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Iqra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f4d7c8;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* screens */

.screen{
display:none;
}

.active{
display:block;
}

/* card */

.card{
background:white;
padding:40px;
border-radius:18px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* title */

#title{
font-size:34px;
font-weight:700;
color:#ff4d6d;
margin-bottom:20px;
min-height:40px;
}

/* message */

#message{
font-size:17px;
line-height:1.7;
color:#444;
min-height:160px;
white-space:pre-line;
}

/* gif */

#gifScreen img{
width:260px;
border-radius:12px;
}

/* input */

input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:180px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

button:hover{
background:#ff3355;
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="login" class="screen active">

<div class="card">

<h2>Private Page 🔒</h2>

<input type="password" id="pass" placeholder="Password">

<br>

<button onclick="checkPass()">Enter</button>

</div>

</div>

<!-- GIF SURPRISE -->

<div id="gifScreen" class="screen">

<div class="card">

<img src="https://64.media.tumblr.com/6f8c976e4b9ca4fb6ef602a209d5dc1d/75977a3f5d4ae7cd-d4/s540x810/da3df3c74870a8eb30204c037248a0856e92bf57.gifv">

<h3>Surprise 🎉</h3>

</div>

</div>

<!-- MAIN PAGE -->

<div id="main" class="screen">

<div class="card">

<div id="title"></div>

<div id="message"></div>

</div>

</div>

<script>

/* PASSWORD */

function checkPass(){

let p=document.getElementById("pass").value

if(p==="iqra"){

document.getElementById("login").classList.remove("active")
document.getElementById("gifScreen").classList.add("active")

setTimeout(()=>{

document.getElementById("gifScreen").classList.remove("active")
document.getElementById("main").classList.add("active")

startTyping()

},3500)

}else{

alert("Wrong password")

}

}

/* TITLE TYPING */

let titleText="Happy Birthday Iqra 🎉"
let titleIndex=0

function typeTitle(){

if(titleIndex<titleText.length){

document.getElementById("title").innerHTML+=titleText.charAt(titleIndex)

titleIndex++

setTimeout(typeTitle,90)

}else{

typeMessage()

}

}

/* MESSAGE TYPING */

let messageText=`Hey Bastii ❤️

I know this wish is a little late, but I still wanted to take a moment to celebrate you. Happy Birthday! 🎉 Even if my message didn’t reach you on the exact day, my wishes for you are just as genuine and full of love. You are one of the most amazing people in my life, and I’m really grateful to have a friend like you.

Thank you for always being there, for the laughs, the random conversations, and the memories we’ve created together. You make everything more fun and meaningful just by being yourself. I truly admire your kindness, your strength, and the positive energy you bring wherever you go.

On your birthday, I just want to wish you happiness, success, and all the beautiful things life has to offer. May this year bring you closer to your dreams and fill your days with joy, adventure, and unforgettable moments. You deserve nothing but the best.

I’m sorry again for the late wish, but please know that you’re always appreciated and valued. I hope your birthday was as wonderful as you are. And don’t worry, we’ll celebrate properly soon! 🎂

Happy Belated Birthday, Bastii! 🥳`

let msgIndex=0

function typeMessage(){

if(msgIndex<messageText.length){

document.getElementById("message").innerHTML+=messageText.charAt(msgIndex)

msgIndex++

setTimeout(typeMessage,35)

}

}

function startTyping(){

typeTitle()

}

</script>

</body>
</html>
